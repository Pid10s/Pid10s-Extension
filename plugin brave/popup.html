<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desacoplador de Pid10s</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="header">
        <img src="icon.png" alt="Logo" class="logo">
        <h1>Pid10s Extensión</h1>
    </div>

    <div class="settings-container">
        <!-- Atajos de música / teclado -->
        <div class="setting-row" id="shortcuts-link" style="border-bottom: 1px solid #333; padding-bottom: 12px; margin-bottom: 5px;">
            <span class="setting-title" style="color:#00e676;">&#9881; Ajustar Atajos (Música)</span>
            <span style="font-size:12px; color:#888;">&rarr;</span>
        </div>

        <label class="setting-row">
            <span class="setting-title">Desacoplar vídeos (PiP)</span>
            <div class="toggle-switch">
                <input type="checkbox" id="togglePip">
                <span class="slider"></span>
            </div>
        </label>
        
        <label class="setting-row">
            <span class="setting-title">Control de volumen</span>
            <div class="toggle-switch">
                <input type="checkbox" id="toggleVolume">
                <span class="slider"></span>
            </div>
        </label>
        
        <div id="youtube-download-section" class="download-section" style="display: none;">
            <div class="setting-title" style="margin-bottom: 8px;">Descargar Vídeo</div>
            <div class="download-controls">
                <select id="video-quality-select" disabled>
                    <option value="">Cargando...</option>
                </select>
                <button id="download-btn" disabled>Descargar</button>
            </div>
            <button id="download-mp3-btn" disabled style="width: 100%; margin-top: 5px; margin-bottom: 5px; padding: 6px; background-color: #ff9800; color: #1e1e1e; font-weight: bold; border: none; border-radius: 4px; cursor: pointer;">Descargar MP3</button>
            <div id="download-status" class="status-msg"></div>
            <button id="open-folder-btn" style="display:none; width: 100%; margin-top: 10px; padding: 6px; background-color: #ff9800; color: #1e1e1e; font-weight: bold; border: none; border-radius: 4px; cursor: pointer;">Abrir Carpeta para Arrancar</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
